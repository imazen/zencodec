[package]
name = "zencodec-types"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
license = "Apache-2.0 OR MIT"
description = "Shared traits and types for zen* image codecs"
categories = ["multimedia::images"]
keywords = ["image", "codec", "traits"]
repository = "https://github.com/imazen/zencodec-types"

[features]
default = ["codec"]
codec = ["dep:rgb", "dep:imgref", "dep:enough", "dep:bytemuck", "dep:zenpixels-convert", "zenpixels/buffer"]

[dependencies]
zenpixels = { version = "0.1", path = "../zenpixels/zenpixels", features = ["buffer"] }
bytemuck = { version = "1.25", default-features = false, features = ["extern_crate_alloc", "derive"], optional = true }
enough = { version = "0.4", optional = true }
rgb = { version = "0.8", default-features = false, features = ["bytemuck"], optional = true }
imgref = { version = "1.12", optional = true }
zenpixels-convert = { version = "0.1", path = "../zenpixels/zenpixels-convert", features = ["buffer"], optional = true }
whereat = { version = "0.1", default-features = false }
