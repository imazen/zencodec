name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true
  # Public-API snapshot regen (tests/public_api_doc.rs) needs nightly rustdoc
  # + cargo-public-api; only the clippy job carries them and runs the =check
  # gate. Everywhere else the test skips.
  ZEN_API_DOC: off

jobs:
  # ==========================================================================
  # Native testing (6-platform matrix)
  # ==========================================================================
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: Linux x64 }
          - { os: ubuntu-24.04-arm, name: Linux aarch64 }
          - { os: macos-latest, name: macOS arm64 }
          - { os: macos-26-intel, name: macOS x64 }
          - { os: windows-latest, name: Windows x64 }
          - { os: windows-11-arm, name: Windows arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2


      - name: Test
        run: cargo test

      - name: Check no_std (no codec feature)
        run: cargo check --no-default-features

  # ==========================================================================
  # Cross-compiled 32-bit testing (i686 via QEMU)
  # ==========================================================================
  test-i686:
    name: Test i686
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686


      - name: Test (i686/QEMU)
        run: cross test --target i686-unknown-linux-gnu
        env:
          # cross containers don't inherit host env, so the workflow-level
          # ZEN_API_DOC=off doesn't reach the test binary; inject it explicitly.
          CROSS_CONTAINER_OPTS: "--env ZEN_API_DOC=off"

  # ==========================================================================
  # WASM check
  # ==========================================================================
  wasm:
    name: WASM (wasm32-wasip1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2


      - name: Check WASM (no_std)
        run: cargo check --target wasm32-wasip1 --no-default-features

  # ==========================================================================
  # Clippy
  # ==========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2


      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - uses: dtolnay/rust-toolchain@nightly # rustdoc JSON for cargo-public-api
      - uses: dtolnay/rust-toolchain@stable # restore stable as default
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api

      - name: Public-API snapshots are current
        run: cargo test -p zencodec --test public_api_doc
        env:
          ZEN_API_DOC: check

  # ==========================================================================
  # Format check
  # ==========================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  # ==========================================================================
  # MSRV check
  # ==========================================================================
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install MSRV toolchain
        run: rustup toolchain install 1.88.0 --no-self-update --profile minimal

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels-convert"|git = "https://github.com/imazen/zenpixels"|g' \
            Cargo.toml > Cargo.toml.ci && \
            mv Cargo.toml.ci Cargo.toml
          # Add [patch.crates-io] only if not already present
          if ! grep -q '\[patch.crates-io\]' Cargo.toml; then
            printf '\n[patch.crates-io]\nzenpixels = { git = "https://github.com/imazen/zenpixels" }\n' >> Cargo.toml
          fi
          rm -f Cargo.lock

      - name: Check MSRV
        run: cargo +1.88.0 check

  # ==========================================================================
  # Semver check (API compatibility)
  # ==========================================================================
  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks


      - name: Check semver
        # Enforcing: a breaking change vs the published baseline fails CI (no
        # `continue-on-error`, which previously let real breaks pass green). The
        # crate is non-breaking vs 0.1.20; intentional breaks must bump the version
        # and clear CHANGELOG's QUEUED BREAKING list.
        run: cargo semver-checks check-release

  # ==========================================================================
  # Code coverage
  # ==========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2


      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
